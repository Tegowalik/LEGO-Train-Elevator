<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">LEGO Train Elevator level 2 platform concept</title>
  <desc id="desc">Concept diagram explaining the level 2 half-position and platform extension used by the LEGO train elevator.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #1d2633; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #4d5b6a; }
      .shaft { fill: #e2e8f0; stroke: #334155; stroke-width: 3; rx: 14; }
      .level-line { stroke: #64748b; stroke-width: 3; stroke-dasharray: 10 8; }
      .track { stroke: #111827; stroke-width: 12; stroke-linecap: round; }
      .platform { fill: #ffffff; stroke: #2563eb; stroke-width: 4; rx: 8; }
      .extension { fill: #bbf7d0; stroke: #16a34a; stroke-width: 4; rx: 8; }
      .half { fill: #fef3c7; stroke: #f97316; stroke-width: 3; rx: 8; }
      .label { font: 700 18px Arial, sans-serif; fill: #1d2633; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .badge-text { font: 700 15px Arial, sans-serif; fill: #ffffff; }
      .orange { fill: #f97316; }
      .green { fill: #16a34a; }
      .blue { fill: #2563eb; }
      .callout { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 10; }
      .arrow { fill: none; stroke: #1f2937; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1300" height="760"/>
  <text class="title" x="60" y="70">Level 2 Platform Concept</text>
  <text class="subtitle" x="60" y="100">The elevator uses an intermediate Level.TWO_HALF position so the level 2 platform can extend safely.</text>

  <rect class="shaft" x="120" y="150" width="260" height="520"/>
  <line class="level-line" x1="100" y1="220" x2="1180" y2="220"/>
  <line class="level-line" x1="100" y1="410" x2="1180" y2="410"/>
  <line class="level-line" x1="100" y1="600" x2="1180" y2="600"/>

  <circle class="orange" cx="80" cy="220" r="24"/><text class="badge-text" x="73" y="226">3</text>
  <circle class="green" cx="80" cy="410" r="24"/><text class="badge-text" x="73" y="416">2</text>
  <circle class="blue" cx="80" cy="600" r="24"/><text class="badge-text" x="73" y="606">1</text>

  <line class="track" x1="390" y1="220" x2="760" y2="220"/>
  <line class="track" x1="390" y1="410" x2="760" y2="410"/>
  <line class="track" x1="390" y1="600" x2="760" y2="600"/>

  <rect class="platform" x="155" y="365" width="190" height="58"/>
  <rect class="extension" x="345" y="378" width="120" height="32"/>
  <rect class="half" x="155" y="315" width="190" height="38"/>
  <text class="label" x="170" y="340">TWO_HALF</text>

  <path class="arrow" d="M250 600 C250 520 250 470 250 425"/>
  <path class="arrow" d="M250 365 C250 350 250 345 250 353"/>
  <path class="arrow" d="M465 394 C520 394 565 400 610 410"/>

  <rect class="callout" x="820" y="180" width="360" height="120"/>
  <text class="label" x="850" y="218">1. Approach level 2</text>
  <text class="small" x="850" y="246">When moving upward, the elevator first stops</text>
  <text class="small" x="850" y="270">near Level.TWO_HALF instead of directly at level 2.</text>

  <rect class="callout" x="820" y="340" width="360" height="130"/>
  <text class="label" x="850" y="378">2. Extend platform</text>
  <text class="small" x="850" y="406">The incoming/outgoing level 2 platform flag</text>
  <text class="small" x="850" y="430">is broadcast over MOTOR and expander hubs</text>
  <text class="small" x="850" y="454">move the platform motor.</text>

  <rect class="callout" x="820" y="515" width="360" height="120"/>
  <text class="label" x="850" y="553">3. Move to final level 2</text>
  <text class="small" x="850" y="581">After the wait, the elevator moves to</text>
  <text class="small" x="850" y="605">the configured Level.TWO angle.</text>
</svg>
