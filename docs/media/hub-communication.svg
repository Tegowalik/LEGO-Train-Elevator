<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">LEGO Train Elevator hub-to-hub communication diagram</title>
  <desc id="desc">BLE broadcast and observe relationships between the main motor hub, sensor hubs, switch hub, optional motor expander hubs, and optional switch sensor hub.</desc>
  <defs>
    <marker id="arrow-main" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f6fed" />
    </marker>
    <marker id="arrow-support" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#17845b" />
    </marker>
    <marker id="arrow-optional" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8b6f2a" />
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #1d2633; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #4d5b6a; }
      .hub { fill: #ffffff; stroke: #243447; stroke-width: 2.5; rx: 14; }
      .main-hub { fill: #eef4ff; stroke: #2f6fed; stroke-width: 3; rx: 14; }
      .optional-hub { fill: #fff9e8; stroke: #8b6f2a; stroke-width: 2.5; stroke-dasharray: 8 6; rx: 14; }
      .hub-title { font: 700 22px Arial, sans-serif; fill: #1d2633; }
      .hub-file { font: 600 15px Arial, sans-serif; fill: #526071; }
      .hub-detail { font: 400 15px Arial, sans-serif; fill: #314253; }
      .channel { font: 700 14px Arial, sans-serif; fill: #ffffff; }
      .label { font: 700 15px Arial, sans-serif; fill: #1f2f43; }
      .label-small { font: 400 13px Arial, sans-serif; fill: #445467; }
      .main-line { fill: none; stroke: #2f6fed; stroke-width: 3; marker-end: url(#arrow-main); }
      .support-line { fill: none; stroke: #17845b; stroke-width: 3; marker-end: url(#arrow-support); }
      .optional-line { fill: none; stroke: #8b6f2a; stroke-width: 3; stroke-dasharray: 9 7; marker-end: url(#arrow-optional); }
      .legend-box { fill: #ffffff; stroke: #c8d0da; stroke-width: 1.5; rx: 10; }
      .legend-text { font: 400 14px Arial, sans-serif; fill: #334155; }
      .note { font: 400 14px Arial, sans-serif; fill: #5d6a7a; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="920" />

  <text class="title" x="70" y="70">LEGO Train Elevator Hub Communication</text>
  <text class="subtitle" x="70" y="100">Pybricks BLE broadcasts: each hub broadcasts on one channel and observes the channels it needs.</text>

  <rect class="main-hub" x="515" y="330" width="370" height="190" />
  <text class="hub-title" x="545" y="375">Main Motor Hub</text>
  <text class="hub-file" x="545" y="400">elevator_motor.py</text>
  <text class="hub-detail" x="545" y="430">Broadcasts Channel.MOTOR 113</text>
  <text class="hub-detail" x="545" y="455">Elevator state, current/new levels,</text>
  <text class="hub-detail" x="545" y="480">movement progress, readiness, level 2 flags</text>

  <rect x="90" y="195" width="320" height="155" class="hub" />
  <text class="hub-title" x="120" y="240">Switch Hub</text>
  <text class="hub-file" x="120" y="265">elevator_switch.py</text>
  <text class="hub-detail" x="120" y="295">Broadcasts Channel.SWITCH 110</text>
  <text class="hub-detail" x="120" y="320">Switch positions, waiting trains</text>

  <rect x="90" y="565" width="320" height="155" class="hub" />
  <text class="hub-title" x="120" y="610">Incoming Sensor Hub</text>
  <text class="hub-file" x="120" y="635">elevator_incoming.py</text>
  <text class="hub-detail" x="120" y="665">Broadcasts Channel.INCOMING 111</text>
  <text class="hub-detail" x="120" y="690">Entrance blocked / stable state</text>

  <rect x="990" y="565" width="320" height="155" class="hub" />
  <text class="hub-title" x="1020" y="610">Outgoing Selector Hub</text>
  <text class="hub-file" x="1020" y="635">elevator_outcoming.py</text>
  <text class="hub-detail" x="1020" y="665">Broadcasts Channel.OUTCOMING 112</text>
  <text class="hub-detail" x="1020" y="690">Selected target level, move request</text>

  <rect x="990" y="195" width="320" height="155" class="optional-hub" />
  <text class="hub-title" x="1020" y="240">Motor Expander Hubs</text>
  <text class="hub-file" x="1020" y="265">elevator_motor_expander.py</text>
  <text class="hub-detail" x="1020" y="295">Channels 114 / 115</text>
  <text class="hub-detail" x="1020" y="320">Sync extra motor groups to MOTOR</text>

  <rect x="90" y="760" width="320" height="105" class="optional-hub" />
  <text class="hub-title" x="120" y="800">Switch Sensor Hub</text>
  <text class="hub-file" x="120" y="825">elevator_switch_sensor.py</text>
  <text class="hub-detail" x="120" y="850">Broadcasts Channel.SWITCH_SENSOR 116</text>

  <rect x="990" y="760" width="320" height="105" class="optional-hub" />
  <text class="hub-title" x="1020" y="800">Level 2 Platform Hub</text>
  <text class="hub-file" x="1020" y="825">elevator_level2platform.py</text>
  <text class="hub-detail" x="1020" y="850">Experimental separate platform control</text>

  <rect x="545" y="170" width="310" height="95" class="legend-box" />
  <line x1="570" y1="200" x2="650" y2="200" class="main-line" />
  <text class="legend-text" x="670" y="205">Main MOTOR broadcast</text>
  <line x1="570" y1="230" x2="650" y2="230" class="support-line" />
  <text class="legend-text" x="670" y="235">Required support broadcast</text>
  <line x1="570" y1="260" x2="650" y2="260" class="optional-line" />
  <text class="legend-text" x="670" y="265">Optional broadcast</text>

  <!-- Main motor hub broadcasts MOTOR to all support hubs. -->
  <path class="main-line" d="M515,385 C430,360 420,285 410,272" />
  <rect x="412" y="310" width="105" height="28" rx="14" fill="#2f6fed" />
  <text class="channel" x="430" y="330">MOTOR 113</text>

  <path class="main-line" d="M555,520 C505,595 455,630 410,642" />
  <rect x="420" y="560" width="105" height="28" rx="14" fill="#2f6fed" />
  <text class="channel" x="438" y="580">MOTOR 113</text>

  <path class="main-line" d="M845,520 C900,595 945,630 990,642" />
  <rect x="875" y="560" width="105" height="28" rx="14" fill="#2f6fed" />
  <text class="channel" x="893" y="580">MOTOR 113</text>

  <path class="main-line" d="M885,385 C955,355 970,295 990,272" />
  <rect x="884" y="310" width="105" height="28" rx="14" fill="#2f6fed" />
  <text class="channel" x="902" y="330">MOTOR 113</text>

  <path class="optional-line" d="M815,520 C925,640 975,735 990,812" />
  <rect x="815" y="675" width="105" height="28" rx="14" fill="#8b6f2a" />
  <text class="channel" x="833" y="695">MOTOR 113</text>

  <!-- Required support hubs send their channels back to main motor hub. -->
  <path class="support-line" d="M410,235 C505,230 515,305 545,330" />
  <rect x="430" y="235" width="110" height="28" rx="14" fill="#17845b" />
  <text class="channel" x="449" y="255">SWITCH 110</text>

  <path class="support-line" d="M410,690 C485,685 515,570 560,520" />
  <rect x="430" y="645" width="125" height="28" rx="14" fill="#17845b" />
  <text class="channel" x="445" y="665">INCOMING 111</text>

  <path class="support-line" d="M990,690 C915,685 885,570 840,520" />
  <rect x="855" y="645" width="135" height="28" rx="14" fill="#17845b" />
  <text class="channel" x="867" y="665">OUTCOMING 112</text>

  <!-- Optional motor expanders report status back to main. -->
  <path class="optional-line" d="M990,235 C900,230 875,305 855,330" />
  <rect x="860" y="235" width="135" height="28" rx="14" fill="#8b6f2a" />
  <text class="channel" x="872" y="255">114 / 115 status</text>

  <!-- Sensor-to-sensor/support observations. -->
  <path class="support-line" d="M250,565 C250,460 250,405 250,350" />
  <rect x="185" y="445" width="125" height="28" rx="14" fill="#17845b" />
  <text class="channel" x="200" y="465">SWITCH 110</text>

  <path class="support-line" d="M990,620 C810,605 650,605 410,620" />
  <rect x="630" y="586" width="125" height="28" rx="14" fill="#17845b" />
  <text class="channel" x="645" y="606">INCOMING 111</text>

  <path class="optional-line" d="M250,760 C250,710 250,650 250,350" />
  <rect x="285" y="735" width="150" height="28" rx="14" fill="#8b6f2a" />
  <text class="channel" x="300" y="755">SWITCH_SENSOR 116</text>

  <text class="label" x="530" y="570">Main hub observes:</text>
  <text class="label-small" x="530" y="594">SWITCH, INCOMING, OUTCOMING, and configured motor-expander channels</text>

  <text class="label" x="1000" y="380">Optional expanders observe MOTOR</text>
  <text class="label-small" x="1000" y="404">and report done/current level/progress to the main hub.</text>

  <text class="note" x="70" y="895">Dashed hubs/lines are optional or experimental. Current CONFIGURATION expects MOTOR_INCOMING, MOTOR, and MOTOR_OUTCOMING unless changed in elevator_utils.py.</text>
</svg>
